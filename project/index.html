<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cake Creators Programme — Kalyan-Ji Bakery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="cake-data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parchment: #FAF7F2;
      --parchment-mid: #F0EBE2;
      --parchment-dark: #E2D9CC;
      --ink: #2C1A0E;
      --ink-mid: #5C4033;
      --ink-light: #9C8070;
      --caramel: #C8956C;
      --caramel-light: #E8C9A8;
      --caramel-dark: #A0704A;
      --cream: #FFF8EE;
      --gold: #C9A96E;
      --gold-light: #E8D5A8;
      --white: #FFFFFF;
      --shadow-sm: 0 2px 8px rgba(44,26,14,0.08);
      --shadow-md: 0 4px 20px rgba(44,26,14,0.12);
      --shadow-lg: 0 8px 40px rgba(44,26,14,0.16);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    html, body, #root {
      height: 100%;
      background: var(--parchment);
      color: var(--ink);
      font-family: var(--font-body);
    }

    body { overflow: hidden; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--parchment-dark); border-radius: 10px; }

    /* Typography */
    .serif { font-family: var(--font-serif); }
    .display { font-family: var(--font-display); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      font-family: var(--font-body); font-weight: 500; cursor: pointer; border: none;
      transition: all 0.2s ease; text-decoration: none; white-space: nowrap;
    }
    .btn-primary {
      background: var(--ink); color: var(--cream); padding: 12px 24px; border-radius: 50px;
      font-size: 14px; letter-spacing: 0.02em;
    }
    .btn-primary:hover { background: var(--ink-mid); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-outline {
      background: transparent; color: var(--ink); padding: 11px 22px; border-radius: 50px;
      font-size: 14px; border: 1.5px solid var(--parchment-dark);
    }
    .btn-outline:hover { border-color: var(--ink); background: var(--parchment-mid); }
    .btn-gold {
      background: var(--gold); color: var(--ink); padding: 12px 24px; border-radius: 50px;
      font-size: 14px; font-weight: 600;
    }
    .btn-gold:hover { background: var(--caramel); color: var(--cream); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-ghost {
      background: transparent; color: var(--ink-mid); padding: 8px 16px; border-radius: 50px;
      font-size: 13px;
    }
    .btn-ghost:hover { background: var(--parchment-mid); color: var(--ink); }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
    .btn-icon {
      width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: var(--parchment-mid); color: var(--ink-mid); font-size: 15px;
      transition: all 0.2s;
    }
    .btn-icon:hover { background: var(--parchment-dark); color: var(--ink); }

    /* Cards */
    .card {
      background: var(--white); border-radius: var(--radius-md); box-shadow: var(--shadow-sm);
      border: 1px solid var(--parchment-dark);
    }

    /* Tags / chips */
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 500;
      background: var(--parchment-mid); color: var(--ink-mid);
    }
    .chip.active { background: var(--ink); color: var(--cream); }

    /* Input */
    .input {
      width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--parchment-dark); background: var(--white);
      font-family: var(--font-body); font-size: 14px; color: var(--ink);
      outline: none; transition: border-color 0.2s;
    }
    .input:focus { border-color: var(--caramel); }
    .input::placeholder { color: var(--ink-light); }
    textarea.input { resize: none; min-height: 80px; }

    /* Stars */
    .stars { color: var(--gold); font-size: 12px; letter-spacing: 1px; }

    /* Toast */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: var(--ink); color: var(--cream); padding: 12px 20px;
      border-radius: var(--radius-sm); font-size: 13px; box-shadow: var(--shadow-md);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Section labels */
    .section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-light);
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="cake-ai-image.js"></script>
<script type="text/babel" src="cake-renderer.jsx"></script>
<script type="text/babel" src="cake-image-preview.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="cake-whatsapp.jsx"></script>
<script type="text/babel" src="cake-builder.jsx"></script>
<script type="text/babel" src="cake-library.jsx"></script>
<script type="text/babel" src="cake-app.jsx"></script>

</body>
</html>
